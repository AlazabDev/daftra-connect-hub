# ------------------------------------------------------------------
# Nginx configuration for console.alazab.cloud
#
# ملاحظة مهمة:
#   هذا الملف يحتوي فقط على كتلة HTTP (المنفذ 80).
#   لا تُضِف يدويًا أي إعدادات SSL هنا — سيقوم Certbot تلقائيًا
#   بإضافة كتلة 443 + شهادة Let's Encrypt عند تشغيل الأمر:
#
#     sudo certbot --nginx -d console.alazab.cloud --redirect
#
# التطبيق يعمل خلف Node/PM2 على المنفذ 8080 (يمكن تغييره عبر PORT).
# ------------------------------------------------------------------

upstream console_alazab_upstream {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name console.alazab.cloud;

    client_max_body_size 50M;
    server_tokens off;

    # لوجات مخصصة للنطاق
    access_log /var/log/nginx/console.alazab.cloud.access.log;
    error_log  /var/log/nginx/console.alazab.cloud.error.log;

    # نقطة تحقق Certbot (webroot) — تبقى قابلة للوصول عبر HTTP دائمًا
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # ملفات ثابتة مبنية من Vite (إن وُجدت في .output/public)
    location /_build/ {
        alias /var/www/console-alazab/current/.output/public/_build/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        alias /var/www/console-alazab/current/.output/public/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # كل ما تبقى يُوجَّه لتطبيق Node
    location / {
        proxy_pass http://console_alazab_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # دعم WebSocket / SSE للـ streaming (AI Gateway / MCP)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }
}
